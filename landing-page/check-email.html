<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quote Chaser | Check your email</title>
    <link rel="shortcut icon" href="../shared-assets/images/favicon.svg" type="image/svg" />
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/animate.css" />
    <link rel="stylesheet" href="assets/css/lineicons.css" />
    <link rel="stylesheet" href="../shared-assets/ud-styles.css" />
  </head>
  <body class="qfu-auth-page qfu-check-email-page">
    <section class="ud-page-banner"><div class="container"><div class="row"><div class="col-lg-12"><div class="ud-banner-content"><h1>Check your email</h1></div></div></div></div></section>
    <section class="ud-login"><div class="container"><div class="row"><div class="col-lg-12"><div class="ud-login-wrapper qfu-login-wrapper">
      <div class="qfu-auth-intro">
        <h2 class="qfu-auth-wordmark">Quote Chaser</h2>
        <p class="qfu-auth-subtitle">Your workspace is ready to activate</p>
      </div>
      <div class="qfu-inline-notice is-success" style="display:block;">
        We created your account for <strong data-email-target>your email address</strong>. <span data-check-email-helper>Check your inbox to verify your email and activate your login.</span>
      </div>
      <div class="qfu-auth-actions-stack">
        <a data-verify-link href="login.html?verified=invalid" class="ud-main-btn w-100">Verify email and continue</a>
        <button type="button" data-resend-verification class="ud-main-btn ud-border-btn w-100">Resend verification email</button>
        <a href="login.html" class="ud-main-btn ud-border-btn w-100">Back to sign in</a>
      </div>
    </div></div></div></div></section>
    <script type="module" src="../shared-assets/js/main.js"></script>
  </body>
</html>
